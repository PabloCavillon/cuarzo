services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cuarzo
      POSTGRES_USER: cuarzo
      POSTGRES_PASSWORD: cuarzo_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuarzo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
