services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cuarzo
      POSTGRES_PASSWORD: cuarzo
      POSTGRES_DB: cuarzo_studio
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuarzo -d cuarzo_studio"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
